<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>내 스레드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0ede8;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#222}

/* ── Header ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(240,237,232,0.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.08);
  padding:11px 15px 8px;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.header-title{font-size:17px;font-weight:800;letter-spacing:-0.4px}
.header-count{font-size:12px;color:#bbb;margin-left:7px}
.header-actions{display:flex;gap:6px}
.hbtn{
  background:none;border:1px solid rgba(0,0,0,0.13);
  border-radius:8px;padding:4px 10px;
  font-size:12px;color:#555;cursor:pointer;
  font-family:inherit;transition:background .15s;white-space:nowrap;
}
.hbtn:hover{background:#e8e5e0}

/* Search bar */
.search-wrap{position:relative}
.search-wrap input{
  width:100%;border:1.5px solid rgba(0,0,0,0.1);
  border-radius:10px;padding:7px 12px 7px 32px;
  font-size:13.5px;font-family:inherit;
  background:#fff;outline:none;color:#222;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:#aaa}
.search-wrap input::placeholder{color:#bbb}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:#ccc;pointer-events:none}

/* Tag filter bar */
.tag-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{
  padding:3px 10px;border-radius:20px;font-size:11.5px;
  border:1.5px solid rgba(0,0,0,0.12);background:#fff;
  cursor:pointer;color:#666;transition:all .15s;white-space:nowrap;
}
.tag-chip:hover{background:#e8e5e0}
.tag-chip.active{background:#222;color:#fff;border-color:#222}
.tag-chip.clear{background:none;border-color:transparent;color:#bbb}

/* ── Feed ── */
#feed{max-width:560px;margin:0 auto;padding:14px 14px 100px}

/* ── Composer ── */
.composer{
  background:#fff;border-radius:18px;
  border:1.5px solid rgba(0,0,0,0.1);
  padding:14px 15px;margin-bottom:14px;
  box-shadow:0 1px 6px rgba(0,0,0,0.04);
}
.composer.reply-composer{
  background:#fafafa;border-radius:13px;
  border-color:rgba(0,0,0,0.06);margin-bottom:0;box-shadow:none;
}
.composer textarea{
  width:100%;border:none;outline:none;resize:none;
  font-size:15px;font-family:inherit;color:#222;
  background:transparent;line-height:1.65;overflow:hidden;min-height:44px;
}
.composer.reply-composer textarea{font-size:13.5px;min-height:34px}
.composer textarea::placeholder{color:#bbb}

/* Tag input row */
.tag-input-row{display:flex;align-items:center;gap:6px;margin:6px 0 2px;flex-wrap:wrap}
.tag-input-row input{
  border:none;outline:none;font-size:12.5px;font-family:inherit;
  color:#555;background:transparent;width:120px;min-width:60px;
}
.tag-input-row input::placeholder{color:#ccc}
.tag-preview{
  display:flex;gap:4px;flex-wrap:wrap;
}
.tag-pill{
  background:#f0ede8;border-radius:20px;
  padding:2px 8px;font-size:11.5px;color:#666;
  display:flex;align-items:center;gap:3px;
}
.tag-pill button{background:none;border:none;cursor:pointer;color:#bbb;font-size:11px;line-height:1;padding:0}
.tag-pill button:hover{color:#ff4d6d}

.composer-imgs{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 2px}
.thumb-wrap{position:relative;display:inline-block}
.thumb-wrap img{max-height:110px;max-width:160px;border-radius:10px;object-fit:cover;display:block;border:1px solid rgba(0,0,0,0.07)}
.del-img{
  position:absolute;top:-6px;right:-6px;
  width:19px;height:19px;border-radius:50%;
  background:#ff4d6d;border:none;color:#fff;
  font-size:12px;cursor:pointer;line-height:19px;text-align:center;padding:0;
}

.composer-bar{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:6px}
.composer-bar-left{display:flex;gap:4px}
.btn-img{background:none;border:none;cursor:pointer;font-size:17px;padding:3px 5px;border-radius:7px;transition:background .15s;line-height:1}
.btn-img:hover{background:#efefef}
.btn-submit{
  background:#222;color:#fff;border:none;border-radius:20px;
  padding:5px 17px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;
}
.btn-submit.disabled{background:#ddd;color:#aaa;cursor:default}
.btn-submit.reply-btn{padding:4px 13px;font-size:12.5px}

/* ── Post card ── */
.post-card{
  background:#fff;border-radius:18px;
  border:1.5px solid rgba(0,0,0,0.08);
  margin-bottom:11px;overflow:hidden;
  box-shadow:0 1px 5px rgba(0,0,0,0.04);
  animation:fadeUp .25s ease both;
}
.post-card.pinned{border-color:rgba(255,180,0,0.5);box-shadow:0 1px 8px rgba(255,180,0,0.15)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.post-body{padding:13px 15px}
.post-row{display:flex;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#a8edea,#fed6e3);border:1.5px solid rgba(0,0,0,0.06)}
.avatar.sm{width:24px;height:24px}

.meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.meta .name{font-size:13px;font-weight:700;color:#333}
.meta .time{font-size:11px;color:#bbb;font-family:monospace}
.pin-badge{font-size:11px;background:#fff8e1;color:#c8970a;border-radius:10px;padding:1px 7px;font-weight:600}
.meta-actions{margin-left:auto;display:flex;gap:2px}
.icon-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:2px 5px;border-radius:5px;
  color:#ccc;transition:color .15s;line-height:1;
}
.icon-btn:hover{color:#444}
.icon-btn.red:hover{color:#ff4d6d}
.icon-btn.yellow:hover{color:#f0b000}
.icon-btn.active-pin{color:#f0b000}

.post-text{font-size:15px;color:#222;line-height:1.65;white-space:pre-wrap;margin-bottom:6px}
.post-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
.post-imgs img{max-height:180px;max-width:240px;border-radius:11px;object-fit:cover;border:1px solid rgba(0,0,0,0.07);cursor:pointer}

/* Tags display */
.post-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.ptag{background:#f0ede8;border-radius:20px;padding:2px 9px;font-size:11.5px;color:#777;cursor:pointer}
.ptag:hover{background:#e5e2dd}

.post-actions{display:flex;gap:14px;margin-top:3px}
.btn-action{background:none;border:none;cursor:pointer;color:#999;font-size:12.5px;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px;transition:color .15s}
.btn-action:hover{color:#444}

/* Edit mode */
.edit-area{
  width:100%;border:1.5px solid rgba(0,0,0,0.12);
  border-radius:10px;padding:8px 11px;
  font-size:15px;font-family:inherit;color:#222;
  background:#f9f9f9;outline:none;resize:none;
  line-height:1.65;margin-bottom:6px;overflow:hidden;
}
.edit-actions{display:flex;gap:7px;justify-content:flex-end;margin-bottom:6px}
.edit-btn{
  border:none;border-radius:8px;padding:4px 12px;
  font-size:12.5px;font-family:inherit;cursor:pointer;
}
.edit-save{background:#222;color:#fff;font-weight:700}
.edit-cancel{background:#eee;color:#666}

/* ── Replies ── */
.replies-wrap{border-top:1px solid rgba(0,0,0,0.05);padding:8px 15px 6px 46px;position:relative}
.thread-line{position:absolute;left:27px;top:0;bottom:0;width:1.5px;background:rgba(0,0,0,0.07)}
.reply-item{display:flex;gap:9px;padding:9px 10px;background:#fafafa;border-radius:12px;margin-bottom:5px;position:relative;animation:fadeUp .2s ease both}
.reply-content{flex:1;min-width:0}
.reply-text{font-size:13.5px;color:#333;line-height:1.6;white-space:pre-wrap;margin-top:3px}
.reply-imgs{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.reply-imgs img{max-height:100px;max-width:150px;border-radius:9px;object-fit:cover;border:1px solid rgba(0,0,0,0.07);cursor:pointer}
.reply-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:#ddd;font-size:12px;padding:2px 4px;border-radius:4px;line-height:1;transition:color .15s}
.reply-del:hover{color:#ff4d6d}

.reply-form-wrap{border-top:1px solid rgba(0,0,0,0.05);padding:10px 15px 10px 46px}

/* ── Empty / No result ── */
.empty{text-align:center;color:#ccc;padding:60px 20px;font-size:14px;line-height:2.2}
.empty .icon{font-size:42px;margin-bottom:10px}

/* ── Image lightbox ── */
#lightbox{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.85);align-items:center;justify-content:center;
}
#lightbox.show{display:flex}
#lightbox img{max-width:94vw;max-height:90vh;border-radius:12px;object-fit:contain}
#lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7}
#lightbox-close:hover{opacity:1}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <span class="header-title">내 스레드</span>
      <span class="header-count" id="postCount">0개</span>
    </div>
    <div class="header-actions">
      <button class="hbtn" onclick="exportHTML()">📤 내보내기</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="글 검색..." oninput="render()">
  </div>
  <div class="tag-bar" id="globalTagBar"></div>
</header>

<div id="feed">
  <div class="composer" id="mainComposer">
    <textarea id="mainText" placeholder="새 글 쓰기..." rows="2"
      oninput="autoResize(this);updateSubmitBtn('main')"
      onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')submitPost()"></textarea>
    <div class="tag-input-row">
      <span style="font-size:12px;color:#ccc">🏷️</span>
      <div class="tag-preview" id="mainTagPreview"></div>
      <input type="text" id="mainTagInput" placeholder="태그 추가 후 Enter"
        onkeydown="handleTagInput(event,'main')">
    </div>
    <div class="composer-imgs" id="mainImgs"></div>
    <div class="composer-bar">
      <div class="composer-bar-left">
        <button class="btn-img" onclick="triggerFile('mainFileInput')" title="사진 첨부">🖼️</button>
        <input type="file" id="mainFileInput" accept="image/*" multiple style="display:none" onchange="handleImages(this,'main')">
      </div>
      <button class="btn-submit disabled" id="mainSubmit" onclick="submitPost()">올리기</button>
    </div>
  </div>

  <div id="postList"></div>
  <div class="empty" id="emptyMsg">
    <div class="icon">📝</div>
    첫 번째 글을 써봐요
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── State ──
const SK = 'thread-memo-v2';
let posts = [];
let mainImages = [];
let mainTags = [];
let activeTag = null;
let editingPostId = null;

// ── Temp state per reply form ──
const _replyImgs = {};
const _replyTags = {};

// ── Storage ──
function save(){ try{ localStorage.setItem(SK,JSON.stringify(posts)); }catch(e){} }
function load(){ try{ const d=localStorage.getItem(SK); if(d) posts=JSON.parse(d); }catch(e){} }

// ── Image ──
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const max=900; let w=img.width,h=img.height;
        if(w>max){h=h*max/w;w=max;}
        if(h>max){w=w*max/h;h=max;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function handleImages(input,scope){
  const compressed=await Promise.all(Array.from(input.files).map(compressImage));
  if(scope==='main'){
    mainImages.push(...compressed);
    renderComposerImgs('mainImgs',mainImages,i=>{mainImages.splice(i,1);renderComposerImgs('mainImgs',mainImages,i2=>{mainImages.splice(i2,1);renderComposerImgs('mainImgs',mainImages,()=>{});updateSubmitBtn('main');});updateSubmitBtn('main');});
  } else {
    if(!_replyImgs[scope]) _replyImgs[scope]=[];
    _replyImgs[scope].push(...compressed);
    renderComposerImgs('rImgs_'+scope,_replyImgs[scope],i=>{_replyImgs[scope].splice(i,1);renderComposerImgs('rImgs_'+scope,_replyImgs[scope],()=>{});updateSubmitBtn(scope);});
  }
  updateSubmitBtn(scope==='main'?'main':scope);
  input.value='';
}
function renderComposerImgs(cid,imgs,onRemove){
  const el=document.getElementById(cid); if(!el) return;
  el.innerHTML='';
  imgs.forEach((src,i)=>{
    const wrap=document.createElement('div'); wrap.className='thumb-wrap';
    const img=document.createElement('img'); img.src=src;
    const btn=document.createElement('button'); btn.className='del-img'; btn.textContent='×';
    btn.onclick=()=>onRemove(i);
    wrap.appendChild(img); wrap.appendChild(btn); el.appendChild(wrap);
  });
}
function triggerFile(id){ document.getElementById(id).click(); }

// ── Tags ──
function handleTagInput(e,scope){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const input=e.target;
    const val=input.value.trim().replace(/^#/,'');
    if(!val) return;
    if(scope==='main'){
      if(!mainTags.includes(val)) mainTags.push(val);
      input.value='';
      renderTagPreview('mainTagPreview',mainTags,i=>{mainTags.splice(i,1);renderTagPreview('mainTagPreview',mainTags,i2=>{mainTags.splice(i2,1);renderTagPreview('mainTagPreview',mainTags,()=>{});});});
    } else {
      if(!_replyTags[scope]) _replyTags[scope]=[];
      if(!_replyTags[scope].includes(val)) _replyTags[scope].push(val);
      input.value='';
      renderTagPreview('rTags_'+scope,_replyTags[scope],i=>{_replyTags[scope].splice(i,1);renderTagPreview('rTags_'+scope,_replyTags[scope],()=>{});});
    }
  }
}
function renderTagPreview(cid,tags,onRemove){
  const el=document.getElementById(cid); if(!el) return;
  el.innerHTML='';
  tags.forEach((t,i)=>{
    const pill=document.createElement('span'); pill.className='tag-pill';
    pill.innerHTML=`#${escHtml(t)} `;
    const btn=document.createElement('button'); btn.textContent='×'; btn.onclick=()=>onRemove(i);
    pill.appendChild(btn); el.appendChild(pill);
  });
}

// ── Helpers ──
function autoResize(ta){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }
function updateSubmitBtn(scope){
  if(scope==='main'){
    const active=document.getElementById('mainText').value.trim()||mainImages.length>0;
    document.getElementById('mainSubmit').classList.toggle('disabled',!active);
  } else {
    const ta=document.getElementById('rText_'+scope);
    const btn=document.getElementById('rSubmit_'+scope);
    if(!ta||!btn) return;
    const imgs=(_replyImgs[scope])||[];
    const active=ta.value.trim()||imgs.length>0;
    btn.classList.toggle('disabled',!active);
  }
}
function formatTime(ts){
  const d=new Date(ts);
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Lightbox ──
function openLightbox(src){ document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('show'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

// ── Post actions ──
function submitPost(){
  const text=document.getElementById('mainText').value.trim();
  if(!text&&mainImages.length===0) return;
  const post={
    id:Date.now().toString(),text,
    images:[...mainImages],tags:[...mainTags],
    ts:Date.now(),pinned:false,replies:[]
  };
  posts.unshift(post);
  mainImages=[]; mainTags=[];
  document.getElementById('mainText').value='';
  document.getElementById('mainText').style.height='auto';
  document.getElementById('mainImgs').innerHTML='';
  document.getElementById('mainTagPreview').innerHTML='';
  document.getElementById('mainTagInput').value='';
  updateSubmitBtn('main');
  save(); render();
}

function deletePost(id){
  if(!confirm('이 글을 삭제할까요?')) return;
  posts=posts.filter(p=>p.id!==id);
  save(); render();
}

function togglePin(id){
  const p=posts.find(p=>p.id===id);
  if(p){ p.pinned=!p.pinned; save(); render(); }
}

function startEdit(id){
  editingPostId=id;
  renderPostEl(id);
  setTimeout(()=>{
    const ta=document.getElementById('editArea_'+id);
    if(ta){ autoResize(ta); ta.focus(); ta.selectionStart=ta.value.length; }
  },50);
}

function cancelEdit(){
  editingPostId=null;
  const id=editingPostId;
  render();
}

function saveEdit(id){
  const ta=document.getElementById('editArea_'+id);
  if(!ta) return;
  const post=posts.find(p=>p.id===id);
  if(post){ post.text=ta.value.trim(); post.editedAt=Date.now(); }
  editingPostId=null;
  save(); render();
}

function addReply(postId){
  const ta=document.getElementById('rText_'+postId);
  const imgs=(_replyImgs[postId])||[];
  const tags=(_replyTags[postId])||[];
  const text=ta?ta.value.trim():'';
  if(!text&&imgs.length===0) return;
  const post=posts.find(p=>p.id===postId);
  if(!post) return;
  post.replies.push({id:Date.now().toString(),text,images:[...imgs],tags:[...tags],ts:Date.now()});
  _replyImgs[postId]=[]; _replyTags[postId]=[];
  save(); render();
  setTimeout(()=>{ openForms.add(postId); renderPostEl(postId); },0);
}

function deleteReply(postId,replyId){
  const post=posts.find(p=>p.id===postId);
  if(!post) return;
  post.replies=post.replies.filter(r=>r.id!==replyId);
  save(); render();
}

// ── UI toggle state ──
const openForms=new Set();
const collapsedReplies=new Set();

function toggleReplyForm(postId){
  openForms.has(postId)?openForms.delete(postId):openForms.add(postId);
  renderPostEl(postId);
}
function toggleReplies(postId){
  collapsedReplies.has(postId)?collapsedReplies.delete(postId):collapsedReplies.add(postId);
  renderPostEl(postId);
}

// ── Tag filter ──
function setActiveTag(tag){
  activeTag=activeTag===tag?null:tag;
  render();
}

function getAllTags(){
  const set=new Set();
  posts.forEach(p=>{ (p.tags||[]).forEach(t=>set.add(t)); });
  return [...set].sort();
}

function renderGlobalTagBar(){
  const tags=getAllTags();
  const bar=document.getElementById('globalTagBar');
  if(!tags.length){ bar.innerHTML=''; return; }
  bar.innerHTML=`
    ${activeTag?`<span class="tag-chip clear" onclick="setActiveTag(null)">✕ 전체</span>`:''}
    ${tags.map(t=>`<span class="tag-chip${activeTag===t?' active':''}" onclick="setActiveTag('${escHtml(t)}')">#${escHtml(t)}</span>`).join('')}
  `;
}

// ── Build HTML ──
function buildPostHTML(post){
  const isEditing=editingPostId===post.id;
  const replyOpen=openForms.has(post.id);
  const collapsed=collapsedReplies.has(post.id);
  const hasReplies=post.replies&&post.replies.length>0;

  const imgsHTML=post.images&&post.images.length
    ?`<div class="post-imgs">${post.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>`:'' ;

  const tagsHTML=post.tags&&post.tags.length
    ?`<div class="post-tags">${post.tags.map(t=>`<span class="ptag" onclick="setActiveTag('${escHtml(t)}')">#${escHtml(t)}</span>`).join('')}</div>`:'';

  const textBlock=isEditing
    ?`<textarea class="edit-area" id="editArea_${post.id}" oninput="autoResize(this)">${escHtml(post.text)}</textarea>
      <div class="edit-actions">
        <button class="edit-btn edit-cancel" onclick="cancelEdit_${post.id}()">취소</button>
        <button class="edit-btn edit-save" onclick="saveEdit('${post.id}')">저장</button>
      </div>`
    :post.text?`<div class="post-text">${escHtml(post.text)}</div>`:'';

  const repliesHTML=hasReplies&&!collapsed?`
    <div class="replies-wrap">
      <div class="thread-line"></div>
      ${post.replies.map(r=>{
        const rimgs=r.images&&r.images.length?`<div class="reply-imgs">${r.images.map(s=>`<img src="${s}" onclick="openLightbox('${s}')">`).join('')}</div>`:'';
        const rtags=r.tags&&r.tags.length?`<div class="post-tags" style="margin-top:4px">${r.tags.map(t=>`<span class="ptag">#${escHtml(t)}</span>`).join('')}</div>`:'';
        return `
        <div class="reply-item">
          <div class="avatar sm"></div>
          <div class="reply-content">
            <div class="meta">
              <span class="name">나</span>
              <span class="time">${formatTime(r.ts)}</span>
            </div>
            ${r.text?`<div class="reply-text">${escHtml(r.text)}</div>`:''}
            ${rimgs}${rtags}
          </div>
          <button class="reply-del" onclick="deleteReply('${post.id}','${r.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>`:'';

  const replyFormHTML=replyOpen?`
    <div class="reply-form-wrap">
      <div class="composer reply-composer">
        <textarea id="rText_${post.id}" placeholder="답글 쓰기..." rows="1"
          oninput="autoResize(this);updateSubmitBtn('${post.id}')"
          onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')addReply('${post.id}')"></textarea>
        <div class="tag-input-row">
          <span style="font-size:11px;color:#ccc">🏷️</span>
          <div class="tag-preview" id="rTags_${post.id}"></div>
          <input type="text" placeholder="태그" style="font-size:12px;border:none;outline:none;background:transparent;font-family:inherit;width:90px;color:#555"
            onkeydown="handleTagInput(event,'${post.id}')">
        </div>
        <div class="composer-imgs" id="rImgs_${post.id}"></div>
        <div class="composer-bar">
          <div class="composer-bar-left">
            <button class="btn-img" onclick="triggerFile('rFile_${post.id}')" title="사진 첨부">🖼️</button>
            <input type="file" id="rFile_${post.id}" accept="image/*" multiple style="display:none" onchange="handleImages(this,'${post.id}')">
          </div>
          <button class="btn-submit reply-btn disabled" id="rSubmit_${post.id}" onclick="addReply('${post.id}')">답글</button>
        </div>
      </div>
    </div>`:'';

  return `
  <div class="post-card${post.pinned?' pinned':''}" id="post_${post.id}">
    <div class="post-body">
      <div class="post-row">
        <div class="avatar"></div>
        <div style="flex:1;min-width:0">
          <div class="meta">
            <span class="name">나</span>
            <span class="time">${formatTime(post.ts)}</span>
            ${post.pinned?`<span class="pin-badge">📌 고정</span>`:''}
            ${post.editedAt?`<span style="font-size:11px;color:#ccc">(수정됨)</span>`:''}
            <div class="meta-actions">
              <button class="icon-btn yellow${post.pinned?' active-pin':''}" onclick="togglePin('${post.id}')" title="${post.pinned?'고정 해제':'고정'}">📌</button>
              <button class="icon-btn" onclick="startEdit('${post.id}')" title="수정">✏️</button>
              <button class="icon-btn red" onclick="deletePost('${post.id}')" title="삭제">✕</button>
            </div>
          </div>
          ${tagsHTML}
          ${textBlock}
          ${imgsHTML}
          <div class="post-actions">
            <button class="btn-action" onclick="toggleReplyForm('${post.id}')">
              <span>↩</span> 답글 달기
            </button>
            ${hasReplies?`<button class="btn-action" onclick="toggleReplies('${post.id}')">
              ${collapsed?'▸':'▾'} 답글 ${post.replies.length}개
            </button>`:''}
          </div>
        </div>
      </div>
    </div>
    ${repliesHTML}
    ${replyFormHTML}
  </div>`;
}

function renderPostEl(id){
  const el=document.getElementById('post_'+id);
  const post=posts.find(p=>p.id===id);
  if(!el||!post) return;
  const tmp=document.createElement('div');
  tmp.innerHTML=buildPostHTML(post);
  el.replaceWith(tmp.firstElementChild);
}

// cancelEdit needs to be global per post
function cancelEdit_global(id){ editingPostId=null; renderPostEl(id); render(); }

// ── Export to HTML ──
function exportHTML(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=getFilteredPosts();
  if(!filtered.length){ alert('내보낼 글이 없어요.'); return; }

  const rows=filtered.map(p=>{
    const imgs=p.images&&p.images.length?p.images.map(s=>`<img src="${s}" style="max-height:200px;max-width:300px;border-radius:10px;object-fit:cover;margin:4px 4px 0 0;border:1px solid #ddd">`).join(''):'';
    const tags=p.tags&&p.tags.length?`<div style="margin:5px 0 0">${p.tags.map(t=>`<span style="background:#f0ede8;border-radius:12px;padding:2px 8px;font-size:12px;color:#777;margin-right:4px">#${escHtml(t)}</span>`).join('')}</div>`:'';
    const replies=p.replies&&p.replies.length?p.replies.map(r=>{
      const ri=r.images&&r.images.length?r.images.map(s=>`<img src="${s}" style="max-height:120px;max-width:180px;border-radius:8px;object-fit:cover;margin:4px 4px 0 0;border:1px solid #ddd">`).join(''):'';
      const rt=r.tags&&r.tags.length?`<div style="margin-top:4px">${r.tags.map(t=>`<span style="background:#f0ede8;border-radius:12px;padding:2px 8px;font-size:11px;color:#777;margin-right:4px">#${escHtml(t)}</span>`).join('')}</div>`:'';
      return `<div style="margin-left:32px;margin-top:8px;background:#f7f7f7;border-radius:10px;padding:9px 12px;border-left:3px solid #ddd">
        <span style="font-size:11px;color:#aaa;font-family:monospace">${formatTime(r.ts)}</span>
        ${r.text?`<p style="margin:4px 0 0;font-size:13.5px;white-space:pre-wrap;color:#333">${escHtml(r.text)}</p>`:''}
        ${ri}${rt}
      </div>`;
    }).join(''):'';
    return `
    <div style="background:#fff;border-radius:14px;border:1.5px solid #e8e5e0;margin-bottom:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.04)${p.pinned?';border-color:rgba(255,180,0,0.4)':''}">
      <div style="font-size:11px;color:#bbb;font-family:monospace;margin-bottom:6px">${formatTime(p.ts)}${p.pinned?' 📌':''}</div>
      ${tags}
      ${p.text?`<p style="margin:6px 0;font-size:15px;white-space:pre-wrap;color:#222;line-height:1.65">${escHtml(p.text)}</p>`:''}
      ${imgs}
      ${replies}
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>내 스레드 내보내기</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0ede8;padding:20px;max-width:600px;margin:0 auto}
h1{font-size:18px;margin-bottom:6px;color:#111}
.sub{font-size:12px;color:#bbb;margin-bottom:20px}
</style></head>
<body>
<h1>📝 내 스레드</h1>
<div class="sub">내보낸 날짜: ${formatTime(Date.now())} · ${filtered.length}개</div>
${rows}
</body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`내스레드_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
}

// ── Render ──
function getFilteredPosts(){
  const q=(document.getElementById('searchInput')||{}).value||'';
  const sq=q.toLowerCase();
  let list=[...posts];
  if(activeTag) list=list.filter(p=>(p.tags||[]).includes(activeTag));
  if(sq) list=list.filter(p=>
    (p.text||'').toLowerCase().includes(sq)||
    (p.tags||[]).some(t=>t.toLowerCase().includes(sq))||
    (p.replies||[]).some(r=>(r.text||'').toLowerCase().includes(sq))
  );
  // pinned first
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  return list;
}

function render(){
  renderGlobalTagBar();
  const list=getFilteredPosts();
  const postList=document.getElementById('postList');
  const emptyMsg=document.getElementById('emptyMsg');
  document.getElementById('postCount').textContent=posts.length+'개';

  if(!list.length){
    postList.innerHTML='';
    emptyMsg.style.display='block';
    emptyMsg.innerHTML=posts.length
      ?'<div class="icon">🔍</div>검색 결과가 없어요'
      :'<div class="icon">📝</div>첫 번째 글을 써봐요';
    return;
  }
  emptyMsg.style.display='none';
  postList.innerHTML=list.map(buildPostHTML).join('');

  // inject cancelEdit per post
  list.forEach(p=>{
    window[`cancelEdit_${p.id}`]=()=>{ editingPostId=null; render(); };
  });
}

load(); render();
</script>
</body>
</html>
