<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Thread Note</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Thread Note</h1>
        <p class="subtitle">한 문장씩 쌓고, 필요한 곳에 리플을 다는 개인용 스레드 메모</p>
      </div>
      <div class="topbar-actions">
        <button id="exportBtn" class="ghost-btn">내보내기</button>
        <label class="ghost-btn file-label" for="importInput">불러오기</label>
        <input id="importInput" type="file" accept="application/json" hidden />
      </div>
    </header>

    <section class="panel composer-panel">
      <div class="panel-title-row">
        <h2>새 메모</h2>
        <span class="hint">문장 하나를 메인으로 남기고, 아래에 리플을 이어붙이는 방식</span>
      </div>
      <textarea id="rootText" placeholder="예: 오늘 장에서 느낀 핵심 한 줄"></textarea>
      <div class="composer-footer">
        <label class="attach-btn" for="rootImageInput">사진 첨부</label>
        <input id="rootImageInput" type="file" accept="image/*" multiple hidden />
        <div id="rootImagePreview" class="image-preview-row"></div>
      </div>
      <div class="composer-actions">
        <label class="toggle-row">
          <input id="pinRoot" type="checkbox" />
          <span>상단 고정</span>
        </label>
        <button id="addRootBtn" class="primary-btn">메모 추가</button>
      </div>
    </section>

    <section class="panel controls-panel">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="검색" />
      </div>
      <div class="filters">
        <label class="toggle-row">
          <input id="pinnedOnly" type="checkbox" />
          <span>고정만 보기</span>
        </label>
        <label>
          <span class="filter-label">정렬</span>
          <select id="sortSelect">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
          </select>
        </label>
      </div>
    </section>

    <main>
      <section id="emptyState" class="panel empty-state hidden">
        <h3>아직 메모가 없어요</h3>
        <p>윗칸에 한 문장을 적고 메모를 만들면, 그 아래에 리플을 계속 달 수 있어요.</p>
      </section>
      <section id="threads" class="thread-list"></section>
    </main>
  </div>

  <template id="noteTemplate">
    <article class="note-card">
      <div class="note-header">
        <div class="note-meta"></div>
        <div class="note-actions">
          <button class="icon-btn collapse-btn" title="접기/펼치기">접기</button>
          <button class="icon-btn pin-btn" title="고정">고정</button>
          <button class="icon-btn reply-btn" title="리플 달기">리플</button>
          <button class="icon-btn edit-btn" title="수정">수정</button>
          <button class="icon-btn delete-btn danger" title="삭제">삭제</button>
        </div>
      </div>
      <div class="note-text"></div>
      <div class="note-images"></div>
      <div class="inline-editor hidden">
        <textarea class="edit-textarea"></textarea>
        <div class="inline-editor-actions">
          <button class="ghost-btn cancel-edit-btn">취소</button>
          <button class="primary-btn save-edit-btn">저장</button>
        </div>
      </div>
      <div class="reply-composer hidden">
        <textarea class="reply-textarea" placeholder="리플을 적어주세요"></textarea>
        <div class="composer-footer">
          <label class="attach-btn reply-image-label">사진 첨부</label>
          <input class="reply-image-input" type="file" accept="image/*" multiple hidden />
          <div class="image-preview-row reply-image-preview"></div>
        </div>
        <div class="inline-editor-actions">
          <button class="ghost-btn cancel-reply-btn">취소</button>
          <button class="primary-btn submit-reply-btn">등록</button>
        </div>
      </div>
      <div class="children"></div>
    </article>
  </template>

  <script src="script.js" type="module"></script>
</body>
</html>
