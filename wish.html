<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>위시리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #faf8f5;
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    background: #1a1a1a;
    color: #faf8f5;
    padding: 28px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 6px;
    font-family: monospace;
  }

  .header-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-title { font-size: 26px; font-weight: normal; letter-spacing: -0.5px; }

  .ready-badge {
    font-size: 12px;
    color: #4ade80;
    margin-top: 4px;
    font-family: monospace;
  }

  .add-btn {
    background: #faf8f5;
    color: #1a1a1a;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
  }

  .add-btn.active {
    background: #444;
    color: #faf8f5;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

  .form-box {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: none;
  }

  .form-box.open { display: block; }

  .form-box input {
    width: 100%;
    border: none;
    padding: 8px 0;
    font-size: 15px;
    background: transparent;
    outline: none;
    font-family: Georgia, serif;
    color: #1a1a1a;
  }

  .form-box input:first-child {
    border-bottom: 1.5px solid #1a1a1a;
    font-size: 16px;
    margin-bottom: 12px;
  }

  .form-box input:not(:first-child) {
    border-bottom: 1px solid #ddd;
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
  }

  .form-hint {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 10px;
    font-family: monospace;
  }

  .submit-btn {
    background: #1a1a1a;
    color: #faf8f5;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 13px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
    width: 100%;
    margin-top: 6px;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin: 16px 0 12px;
    overflow-x: auto;
    padding-bottom: 2px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: transparent;
    color: #888;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: monospace;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: #1a1a1a;
    color: #faf8f5;
    border-color: #1a1a1a;
  }

  .items { display: flex; flex-direction: column; gap: 10px; }

  .item {
    background: #fff;
    border: 1px solid #e8e4df;
    border-radius: 12px;
    padding: 16px 16px 14px;
    transition: opacity 0.2s;
  }

  .item.bought { opacity: 0.6; background: #f5f5f3; }

  .progress-wrap {
    height: 2px;
    background: #f0ede9;
    border-radius: 2px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .item-body { display: flex; justify-content: space-between; align-items: flex-start; }

  .item-info { flex: 1; }

  .item-name {
    font-size: 16px;
    font-weight: normal;
    color: #1a1a1a;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .item-name.bought-name {
    text-decoration: line-through;
    color: #aaa;
  }

  .item-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .item-price { font-size: 12px; color: #888; font-family: monospace; }
  .item-date  { font-size: 11px; color: #bbb; font-family: monospace; }
  .item-status { font-size: 11px; font-family: monospace; font-weight: bold; }
  .item-note { font-size: 12px; color: #999; margin-top: 6px; font-style: italic; line-height: 1.4; }

  .item-actions { display: flex; gap: 6px; margin-left: 12px; flex-shrink: 0; }

  .action-btn {
    background: #f0ede9;
    border: none;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
  }

  .action-btn.check-ready { background: #4ade80; color: #1a1a1a; }
  .action-btn.check-undo  { background: #e8e4df; }
  .action-btn.del         { color: #aaa; }

  .empty {
    text-align: center;
    color: #bbb;
    padding: 60px 0;
    font-family: monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .stats {
    margin: 24px 0 0;
    padding: 16px;
    background: #f0ede9;
    border-radius: 10px;
    font-family: monospace;
    font-size: 11px;
    color: #888;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">WANT · LIST</div>
  <div class="header-row">
    <div>
      <div class="header-title">위시리스트</div>
      <div class="ready-badge" id="ready-badge"></div>
    </div>
    <button class="add-btn" id="toggle-btn" onclick="toggleForm()">+ 추가</button>
  </div>
</div>

<div class="container">
  <div class="form-box" id="form-box">
    <input type="text" id="inp-name" placeholder="뭐가 갖고싶어?" />
    <input type="text" id="inp-price" placeholder="가격 (선택)" />
    <input type="text" id="inp-note" placeholder="메모 (선택)" />
    <button class="submit-btn" onclick="addItem()">리스트에 추가 →</button>
    <div class="form-hint">30일 후 구매 가능 상태로 전환됩니다</div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('ready', this)">구매 가능</button>
    <button class="filter-btn" onclick="setFilter('waiting', this)">대기중</button>
    <button class="filter-btn" onclick="setFilter('bought', this)">구매완료</button>
  </div>

  <div class="items" id="items"></div>
  <div class="empty" id="empty" style="display:none">항목이 없어요</div>
  <div class="stats" id="stats" style="display:none"></div>
</div>

<script>
  const STORAGE_KEY = 'wishlist-v1';
  let items = [];
  let currentFilter = 'all';
  let formOpen = false;

  function load() {
    try { items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { items = []; }
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function daysSince(dateStr) {
    return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  }

  function fmtDate(dateStr) {
    const d = new Date(dateStr);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function cooldownColor(days) {
    if (days >= 30) return '#4ade80';
    if (days >= 7)  return '#facc15';
    return '#f87171';
  }

  function cooldownLabel(days) {
    if (days >= 30) return '구매 OK ✓';
    return `${30 - days}일 더`;
  }

  function toggleForm() {
    formOpen = !formOpen;
    document.getElementById('form-box').classList.toggle('open', formOpen);
    const btn = document.getElementById('toggle-btn');
    btn.textContent = formOpen ? '취소' : '+ 추가';
    btn.classList.toggle('active', formOpen);
    if (formOpen) document.getElementById('inp-name').focus();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && formOpen) addItem();
  });

  function addItem() {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) return;
    items.unshift({
      id: Date.now(),
      name,
      price: document.getElementById('inp-price').value.trim(),
      note:  document.getElementById('inp-note').value.trim(),
      addedAt: new Date().toISOString(),
      bought: false,
    });
    save();
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-note').value = '';
    toggleForm();
    render();
  }

  function toggleBought(id) {
    items = items.map(i => i.id === id ? {...i, bought: !i.bought} : i);
    save(); render();
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save(); render();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const readyCount = items.filter(i => !i.bought && daysSince(i.addedAt) >= 30).length;

    // badge
    const badge = document.getElementById('ready-badge');
    badge.textContent = readyCount > 0 ? `✓ ${readyCount}개 구매 가능` : '';

    // filter
    let filtered = items;
    if (currentFilter === 'ready')   filtered = items.filter(i => !i.bought && daysSince(i.addedAt) >= 30);
    if (currentFilter === 'waiting') filtered = items.filter(i => !i.bought && daysSince(i.addedAt) < 30);
    if (currentFilter === 'bought')  filtered = items.filter(i => i.bought);

    const container = document.getElementById('items');
    const empty = document.getElementById('empty');
    const stats = document.getElementById('stats');

    if (filtered.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      empty.textContent = currentFilter === 'ready' ? '아직 30일 지난 항목이 없어요' : '항목이 없어요';
    } else {
      empty.style.display = 'none';
      container.innerHTML = filtered.map(item => {
        const days = daysSince(item.addedAt);
        const color = item.bought ? '#aaa' : cooldownColor(days);
        const prog = Math.min(days / 30, 1) * 100;
        const isReady = days >= 30;

        return `
        <div class="item${item.bought ? ' bought' : ''}">
          ${!item.bought ? `
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${prog}%;background:${color}"></div>
          </div>` : ''}
          <div class="item-body">
            <div class="item-info">
              <div class="item-name${item.bought ? ' bought-name' : ''}">${escHtml(item.name)}</div>
              <div class="item-meta">
                ${item.price ? `<span class="item-price">${escHtml(item.price)}</span>` : ''}
                <span class="item-date">${fmtDate(item.addedAt)} 추가</span>
                ${!item.bought ? `<span class="item-status" style="color:${color}">${cooldownLabel(days)}</span>` : ''}
              </div>
              ${item.note ? `<div class="item-note">${escHtml(item.note)}</div>` : ''}
            </div>
            <div class="item-actions">
              <button class="action-btn ${item.bought ? 'check-undo' : isReady ? 'check-ready' : ''}"
                onclick="toggleBought(${item.id})">
                ${item.bought ? '↩' : '✓'}
              </button>
              <button class="action-btn del" onclick="deleteItem(${item.id})">×</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // stats
    if (items.length > 0) {
      const waiting = items.filter(i => !i.bought).length;
      const bought  = items.filter(i => i.bought).length;
      stats.style.display = 'flex';
      stats.innerHTML = `
        <span>총 ${waiting}개 대기</span>
        <span>구매완료 ${bought}개</span>
        <span>구매가능 ${readyCount}개</span>`;
    } else {
      stats.style.display = 'none';
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
</script>
</body>
</html>
